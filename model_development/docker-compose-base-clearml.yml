services:
  apiserver:
    image: allegroai/clearml:2.0.0
    command: apiserver
    container_name: clearml-apiserver
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
      - elasticsearch
      - fileserver
    environment:
      CLEARML_ELASTIC_SERVICE_HOST: elasticsearch
      CLEARML_ELASTIC_SERVICE_PORT: 9200
      CLEARML_MONGODB_SERVICE_HOST: mongo
      CLEARML_MONGODB_SERVICE_PORT: 27017
      CLEARML_REDIS_SERVICE_HOST: redis
      CLEARML_REDIS_SERVICE_PORT: 6379
      CLEARML_SERVER_DEPLOYMENT_TYPE: linux
      CLEARML__apiserver__pre_populate__enabled: "true"
      CLEARML__services__async_urls_delete__enabled: "true"
    ports:
      - "8008:8008"
    volumes:
      - logs:/var/log/clearml
      - ./configs:/opt/clearml/config
      - fileserver:/mnt/fileserver
    networks:
      - backend
      - frontend

  fileserver:
    image: allegroai/clearml:2.0.0
    command: fileserver
    container_name: clearml-fileserver
    restart: unless-stopped
    environment:
      CLEARML__fileserver__delete__allow_batch: "true"
    ports:
      - "8081:8081"
    volumes:
      - logs:/var/log/clearml
      - ./configs:/opt/clearml/config
      - fileserver:/mnt/fileserver
    networks:
      - backend
      - frontend

  webserver:
    image: allegroai/clearml:2.0.0
    command: webserver
    container_name: clearml-webserver
    restart: unless-stopped
    depends_on:
      - apiserver
    ports:
      - "8090:80"
    networks:
      - backend
      - frontend

  async_delete:
    image: allegroai/clearml:2.0.0
    container_name: clearml-async-delete
    restart: unless-stopped
    depends_on:
      - apiserver
      - redis
      - mongo
      - elasticsearch
      - fileserver
    environment:
      CLEARML_ELASTIC_SERVICE_HOST: elasticsearch
      CLEARML_ELASTIC_SERVICE_PORT: 9200
      CLEARML_MONGODB_SERVICE_HOST: mongo
      CLEARML_MONGODB_SERVICE_PORT: 27017
      CLEARML_REDIS_SERVICE_HOST: redis
      CLEARML_REDIS_SERVICE_PORT: 6379
    entrypoint:
      - python3
      - -m
      - jobs.async_urls_delete
      - --fileserver-host
      - http://fileserver:8081
    volumes:
      - logs:/var/log/clearml
      - ./configs:/opt/clearml/config
    networks:
      - backend

  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: clearml-elastic
    restart: unless-stopped
    environment:
      - bootstrap.memory_lock=true
      - cluster.name=clearml
      - cluster.routing.allocation.node_initial_primaries_recoveries=500
      - cluster.routing.allocation.disk.watermark.low=500mb
      - cluster.routing.allocation.disk.watermark.high=500mb
      - cluster.routing.allocation.disk.watermark.flood_stage=500mb
      - discovery.type=single-node
      - http.compression_level=7
      - node.name=clearml
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - backend

  mongo:
    image: mongo:8.0
    container_name: clearml-mongo
    restart: unless-stopped
    command: --setParameter internalQueryMaxBlockingSortMemoryUsageBytes=196100200
    volumes:
      - mongo_db:/data/db
      - mongo_configdb:/data/configdb
    networks:
      - backend

  redis:
    image: redis:7
    container_name: clearml-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - backend

volumes:
  logs:
  configs:
  fileserver:
  mongo_db:
  mongo_configdb:
  redis_data:
  elastic_data:
  serving_logs:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
